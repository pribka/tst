<!-- example_template.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Генерация инвест-проектов</title>
</head>
<body>
    <h1 align="center">Генерация инвест-проектов</h1>

    <div style="width: 1000px; margin: 50px auto;">
        <form id="form" action="{% url 'student_clubs:invest_project_generator_view' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" id="file" name="file" accept=".xlsx" required style="width: 500px; margin: 20px auto; display: block;">
            <button type="submit" style="width: auto; margin: 20px auto; display: block;">Создать инвест-проекты</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('form');
        
        form.addEventListener('submit', function(event) {

            event.preventDefault();
            const formData = new FormData(form);
            const xhr = new XMLHttpRequest();
            xhr.open('POST', form.action, false);

            xhr.addEventListener('load', function() {
                if (xhr.status === 200) {
                    alert('Инвест-проекты созданы.');
                } else {
                    alert('Ошибка создания инвест-проектов.');
                }
            });

            xhr.send(formData);

        });
    </script>    
</body>
</html>
